<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pasteX</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#000;color:#fff;font-family:monospace;padding:24px;}
    textarea,button{font-family:monospace;background:#111;color:#fff;border:none;outline:none;}
    textarea{width:100%;max-width:800px;padding:12px;margin:16px 0;resize:none;}
    button{padding:8px 20px;cursor:pointer;margin-right:8px;}
    button:hover{background:#222;}
    #link{word-break:break-all;}
  </style>
</head>
<body>

<h1>pasteX</h1>

<textarea id="txt" rows="10" placeholder="paste text here"></textarea>
<br>
<button id="create">create paste</button>
<button id="clear">clear</button>

<div id="result" style="display:none; margin-top:20px">
  <div id="link"></div>
  <br>
  <button id="copy">copy link</button>
</div>

<script>
  const txt = document.getElementById('txt');
  const createBtn = document.getElementById('create');
  const clearBtn = document.getElementById('clear');
  const resultDiv = document.getElementById('result');
  const linkSpan = document.getElementById('link');
  const copyBtn = document.getElementById('copy');

  createBtn.onclick = async () => {
    const content = txt.value;
    if (!content.trim()) {
      alert('empty');
      return;
    }
    
    const res = await fetch('/api/paste', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({content})
    });
    
    const data = await res.json();
    if (data.id) {
      const url = location.origin + '/api/paste?id=' + data.id;
      linkSpan.innerText = url;
      resultDiv.style.display = 'block';
      createBtn.innerText = 'created';
      setTimeout(() => createBtn.innerText = 'create paste', 1000);
    } else {
      alert('error');
    }
  };
  
  clearBtn.onclick = () => {
    txt.value = '';
    resultDiv.style.display = 'none';
  };
  
  copyBtn.onclick = async () => {
    const link = linkSpan.innerText;
    if (!link) return;
    await navigator.clipboard.writeText(link);
    copyBtn.innerText = 'copied';
    setTimeout(() => copyBtn.innerText = 'copy link', 1000);
  };
</script>

</body>
</html>
