<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pasteX</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #000;
      color: #fff;
      font-family: monospace;
      padding: 24px;
    }
    textarea, input, button {
      font-family: monospace;
      background: #111;
      color: #fff;
      border: none;
      outline: none;
    }
    textarea {
      width: 100%;
      max-width: 800px;
      padding: 12px;
      margin: 16px 0;
      resize: none;
    }
    input {
      padding: 8px 12px;
      margin-right: 8px;
      width: 200px;
    }
    button {
      padding: 8px 20px;
      cursor: pointer;
      margin-right: 8px;
    }
    button:hover {
      background: #222;
    }
    .option-group {
      margin: 16px 0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
    }
    #link {
      word-break: break-all;
    }
  </style>
</head>
<body>

<h1>pasteX</h1>

<textarea id="txt" rows="10" placeholder="paste text here"></textarea>

<div class="option-group">
  <input type="password" id="password" placeholder="password (optional)">
</div>

<button id="create">create paste</button>
<button id="clear">clear</button>

<div id="result" style="display:none; margin-top:20px">
  <div id="link"></div>
  <br>
  <button id="copy">copy link</button>
</div>

<script>
  const txt = document.getElementById('txt');
  const passwordInput = document.getElementById('password');
  const createBtn = document.getElementById('create');
  const clearBtn = document.getElementById('clear');
  const resultDiv = document.getElementById('result');
  const linkSpan = document.getElementById('link');
  const copyBtn = document.getElementById('copy');

  createBtn.onclick = async () => {
    const content = txt.value;
    if (!content.trim()) {
      alert('empty');
      return;
    }
    
    const password = passwordInput.value.trim();
    
    const res = await fetch('/api/paste', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        content,
        password: password || null
      })
    });
    
    const data = await res.json();
    if (data.id) {
      let url = location.origin + '/api/paste?id=' + data.id;
      if (password) {
        url += '&p=' + encodeURIComponent(password);
      }
      linkSpan.innerText = url;
      resultDiv.style.display = 'block';
      createBtn.innerText = 'created';
      setTimeout(() => createBtn.innerText = 'create paste', 1000);
    } else {
      alert('error: ' + (data.error || 'unknown'));
    }
  };
  
  clearBtn.onclick = () => {
    txt.value = '';
    passwordInput.value = '';
    resultDiv.style.display = 'none';
  };
  
  copyBtn.onclick = async () => {
    const link = linkSpan.innerText;
    if (!link) return;
    await navigator.clipboard.writeText(link);
    copyBtn.innerText = 'copied';
    setTimeout(() => copyBtn.innerText = 'copy link', 1000);
  };
</script>

</body>
</html>
